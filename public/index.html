<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="經營小幫手">
<meta name="theme-color" content="#2D5A4F">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>經營小幫手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F5F2ED;--bg2:#EDE9E2;--surface:#FFF;
  --ink:#1C1917;--ink2:#44403C;--ink3:#78716C;
  --line:#E7E3DC;--line2:#D6D0C8;
  --accent:#2D5A4F;--accent-light:#E8F0EE;
  --copper:#A0622A;--copper-light:#F5EDE4;
  --line-green:#06C755;
  --r:18px;--r2:12px;
}
html,body{height:100%;background:var(--bg2);color:var(--ink);font-family:'Noto Sans TC',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}
.phone{width:100%;max-width:390px;height:100dvh;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,0.1);}

/* STATUS */
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 8px;flex-shrink:0;}
.status-time{font-size:15px;font-weight:600;}
.status-icons{display:flex;gap:6px;align-items:center;}
.status-icons svg{width:15px;height:15px;fill:var(--ink2);}

/* HEADER */
.header{padding:4px 24px 18px;flex-shrink:0;border-bottom:1px solid var(--line);}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;}
.header-eyebrow{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
.header-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--ink);line-height:1.1;}
.header-title em{font-style:italic;font-weight:400;color:var(--accent);}
.avatar{width:44px;height:44px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-top:2px;}

/* DATE STRIP */
.date-strip{display:flex;margin:14px 24px 0;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;}
.date-block{flex:1;padding:12px 10px;border-right:1px solid var(--line);min-width:0;}
.date-block:last-child{border-right:none;}
.date-label{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;white-space:nowrap;}
.date-val{font-size:15px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.date-val.accent{color:var(--accent);}

/* ── TOPIC SLIDER ── */
.topic-section{flex-shrink:0;padding:16px 0 0;}
.topic-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);padding:0 24px;margin-bottom:12px;}
.topic-track{display:flex;gap:10px;padding:0 20px 16px;overflow-x:auto;scrollbar-width:none;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.topic-track::-webkit-scrollbar{display:none;}
.topic-pill{flex-shrink:0;scroll-snap-align:start;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 16px;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;cursor:pointer;transition:all 0.22s cubic-bezier(0.34,1.4,0.64,1);min-width:80px;}
.topic-pill.active{background:var(--accent);border-color:var(--accent);transform:scale(1.06);box-shadow:0 4px 16px rgba(45,90,79,0.3);}
.topic-pill-emoji{font-size:22px;line-height:1;}
.topic-pill-name{font-size:11px;font-weight:700;color:var(--ink2);white-space:nowrap;text-align:center;}
.topic-pill.active .topic-pill-name{color:white;}
.topic-pill-day{font-size:9px;color:var(--ink3);font-weight:500;}
.topic-pill.active .topic-pill-day{color:rgba(255,255,255,0.7);}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-behavior:smooth;}
.scroll-area::-webkit-scrollbar{display:none;}
.panel-inner{padding:20px 20px 48px;}
.sec{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}

/* LOADING */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:16px;}
.loading-spinner{width:28px;height:28px;border:2.5px solid var(--line2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.85s linear infinite;}
.loading-text{font-size:14px;color:var(--ink3);font-weight:300;}

/* NEWS CARD */
.news-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px;overflow:hidden;transition:transform 0.15s;animation:up 0.3s ease both;}
.news-card:active{transform:scale(0.985);}
.news-card:nth-child(1){animation-delay:0.04s;}
.news-card:nth-child(2){animation-delay:0.1s;}
.news-card-top{padding:20px 20px 16px;}
.news-source-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.news-source{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);}
.news-date{font-size:11px;color:var(--ink3);}
.news-headline{font-size:17px;font-weight:700;line-height:1.55;color:var(--ink);margin-bottom:10px;letter-spacing:-0.2px;}
.news-summary{font-size:14px;font-weight:300;line-height:1.85;color:var(--ink2);}

/* CARD ACTIONS */
.news-actions{display:flex;border-top:1px solid var(--line);}
.news-action{flex:1;padding:14px 8px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;border:none;background:none;transition:background 0.15s;color:var(--ink2);}
.news-action:active{background:var(--bg2);}
.news-action+.news-action{border-left:1px solid var(--line);}
.news-action.line-act{color:var(--line-green);}
.news-action.more-act{color:var(--accent);}
.news-action svg{width:15px;height:15px;fill:currentColor;flex-shrink:0;}

/* ERROR */
.error-state{background:var(--copper-light);border:1px solid rgba(160,98,42,0.2);border-radius:var(--r2);padding:24px;text-align:center;}
.err-title{font-size:15px;font-weight:700;color:var(--copper);margin-bottom:8px;}
.err-body{font-size:13px;color:var(--ink3);line-height:1.7;margin-bottom:16px;}
.retry-btn{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;background:var(--accent);color:white;border:none;border-radius:50px;font-size:13px;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;}

/* ANIMATIONS */
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:white;padding:12px 26px;border-radius:50px;font-size:14px;font-weight:500;transition:transform 0.3s cubic-bezier(0.34,1.5,0.64,1);z-index:999;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.2);}
.toast.show{transform:translateX(-50%) translateY(0);}
.safe{height:env(safe-area-inset-bottom,16px);flex-shrink:0;}
</style>
</head>
<body>
<div class="phone">

  <div class="status">
    <span class="status-time" id="clock">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">Insurance Agent</div>
        <div class="header-title">經營 <em>小幫手</em></div>
      </div>
      <div class="avatar">🌿</div>
    </div>
    <div class="date-strip">
      <div class="date-block"><div class="date-label">日期</div><div class="date-val" id="heroDate">5月24日</div></div>
      <div class="date-block"><div class="date-label">星期</div><div class="date-val" id="heroDay">星期日</div></div>
      <div class="date-block"><div class="date-label">今日主題</div><div class="date-val accent" id="heroTheme">美食藝術</div></div>
    </div>
  </div>

  <!-- Topic Slider -->
  <div class="topic-section">
    <div class="topic-label">本週議題</div>
    <div class="topic-track" id="topicTrack"></div>
  </div>

  <!-- News Feed -->
  <div class="scroll-area">
    <div class="panel-inner">
      <div class="sec" id="newsSecLabel">今日新聞</div>
      <div id="cardsContainer">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <div class="loading-text">抓取最新新聞⋯⋯</div>
        </div>
      </div>
    </div>
  </div>

  <div class="safe"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const THEMES = [
  { dow:1, label:'週一', name:'國際財經', short:'國際財經', emoji:'🌐', color:'#2D5A4F', light:'#E8F0EE', query:'國際財經 全球經濟 台灣影響' },
  { dow:2, label:'週二', name:'疾病醫療', short:'疾病醫療', emoji:'🏥', color:'#7C3D3D', light:'#F5EAEA', query:'台灣疾病 醫療健康 新聞' },
  { dow:3, label:'週三', name:'未來科技', short:'未來科技', emoji:'🤖', color:'#2A3D6B', light:'#E8EBF5', query:'台灣未來科技 AI 科技趨勢' },
  { dow:4, label:'週四', name:'旅遊規劃與旅平險', short:'旅遊平安', emoji:'✈️', color:'#2A4A70', light:'#E8EFF8', query:'出國旅遊注意事項 旅遊意外 旅平險' },
  { dow:5, label:'週五', name:'社會新聞焦點', short:'社會焦點', emoji:'📰', color:'#4A3D5A', light:'#F0EDF5', query:'台灣社會新聞 焦點 重大事件' },
  { dow:6, label:'週六', name:'行車安全與意外', short:'行車安全', emoji:'🚗', color:'#3D3D7C', light:'#EEEAF5', query:'台灣行車安全 交通意外 道路安全' },
  { dow:0, label:'週日', name:'美食與藝術生活', short:'美食藝術', emoji:'🍜', color:'#A0622A', light:'#F5EDE4', query:'台灣美食 藝術展覽 生活風格' },
];

const now = new Date();
const dow = now.getDay();
const DAYS_ZH = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

// 找今天的 theme index
const todayIdx = THEMES.findIndex(t => t.dow === dow);
let activeIdx = todayIdx >= 0 ? todayIdx : 0;

// Init header
document.getElementById('clock').textContent =
  String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
document.getElementById('heroDate').textContent = (now.getMonth()+1) + '月' + now.getDate() + '日';
document.getElementById('heroDay').textContent = DAYS_ZH[dow];
document.getElementById('heroTheme').textContent = THEMES[activeIdx].short;

// Build topic pills
const track = document.getElementById('topicTrack');
THEMES.forEach((t, i) => {
  const pill = document.createElement('div');
  pill.className = 'topic-pill' + (i === activeIdx ? ' active' : '');
  pill.innerHTML = `
    <div class="topic-pill-emoji">${t.emoji}</div>
    <div class="topic-pill-name">${t.short}</div>
    <div class="topic-pill-day">${t.label}</div>`;
  pill.addEventListener('click', () => selectTopic(i));
  track.appendChild(pill);
});

// Scroll today's pill into view
setTimeout(() => {
  const pills = track.querySelectorAll('.topic-pill');
  if (pills[activeIdx]) {
    pills[activeIdx].scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  }
}, 100);

function selectTopic(idx) {
  if (idx === activeIdx && document.querySelectorAll('.news-card').length > 0) return;
  activeIdx = idx;
  const t = THEMES[idx];

  // Update pills
  document.querySelectorAll('.topic-pill').forEach((p, i) => {
    p.classList.toggle('active', i === idx);
  });

  // Update header theme
  document.getElementById('heroTheme').textContent = t.short;

  // Update section label
  document.getElementById('newsSecLabel').textContent = t.name + ' · 最新新聞';

  // Scroll pill into view
  const pills = track.querySelectorAll('.topic-pill');
  if (pills[idx]) pills[idx].scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });

  fetchNews(t);
}

// Fetch news
async function fetchNews(t) {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = `
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text">抓取「${t.name}」最新新聞⋯⋯</div>
    </div>`;

  try {
    const params = new URLSearchParams({ theme: t.name, query: t.query });
    const res = await fetch(`/api/news?${params}`);
    const data = await res.json();
    if (!data.ok || !data.articles?.length) throw new Error(data.error || 'no articles');
    renderCards(data.articles, t);
  } catch(e) {
    container.innerHTML = `
      <div class="error-state">
        <div class="err-title">暫時無法取得新聞</div>
        <div class="err-body">請確認網路連線後重試。</div>
        <button class="retry-btn" onclick="selectTopic(${activeIdx})">↺ 重新載入</button>
      </div>`;
  }
}

function renderCards(articles, t) {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  articles.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'news-card';
    card.innerHTML = `
      <div class="news-card-top">
        <div class="news-source-row">
          <span class="news-source">${a.source || 'Google 新聞'}</span>
          <span class="news-date">${a.date || ''}</span>
        </div>
        <div class="news-headline">${a.headline}</div>
        ${a.summary ? `<div class="news-summary">${a.summary}</div>` : ''}
      </div>
      <div class="news-actions">
        <button class="news-action more-act" onclick="openNews(${i})">
          <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
          看完整新聞
        </button>
        <button class="news-action line-act" onclick="shareNews(${i})">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.02 2 11c0 3.03 1.6 5.71 4.04 7.38V21l2.94-1.61C9.9 19.77 10.94 20 12 20c5.52 0 10-4.02 10-9S17.52 2 12 2z"/></svg>
          LINE 分享
        </button>
      </div>`;
    container.appendChild(card);
  });
  window._articles = articles;
  window._activeTheme = t;
}

function openNews(idx) {
  const a = window._articles?.[idx];
  if (!a) return;
  window.open(a.url || `https://news.google.com/search?q=${encodeURIComponent(a.headline)}&hl=zh-TW`, '_blank');
}

function shareNews(idx) {
  const a = window._articles?.[idx];
  if (!a) return;
  // 分享新聞連結 + 標題
  const msg = `${a.headline}\n\n${a.url || ''}`;
  window.open('https://line.me/R/share?text=' + encodeURIComponent(msg), '_blank');
  showToast('✓ 開啟 LINE 分享');
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// Auto load today's topic
selectTopic(activeIdx);
</script>
</body>
</html>
